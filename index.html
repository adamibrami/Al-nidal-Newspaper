<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جريدة النضال الإلكترونية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #fdfaf5; --ink: #111; }
        body { background: #121212; margin: 0; direction: rtl; font-family: 'Amiri', serif; color: var(--ink); }
        .controls { background: #000; padding: 15px; display: flex; justify-content: center; gap: 20px; position: sticky; top: 0; z-index: 999; border-bottom: 2px solid #333; }
        .issue-badge { color: #fff; border: 1px solid #fff; padding: 5px 15px; font-weight: bold; }
        .music-btn { background: #fff; border: none; padding: 8px 15px; cursor: pointer; font-family: 'Amiri'; font-weight: bold; border-radius: 4px; }
        .newspaper-page { width: 1100px; margin: 30px auto; background: var(--paper); padding: 50px; box-shadow: 0 0 50px rgba(0,0,0,0.8); min-height: 1200px; }
        .masthead-container { text-align: center; border-bottom: 5px solid #000; padding-bottom: 10px; }
        .main-title { font-family: 'Noto Naskh Arabic', serif; font-size: 110px; margin: 0; padding: 10px 0 20px 0; line-height: 1.2; letter-spacing: -2px; }
        .sub-header { display: flex; justify-content: space-between; padding: 10px 5px; border-top: 2px solid #000; font-weight: bold; }
        .main-layout { display: grid; grid-template-columns: 220px 1fr 220px; gap: 35px; margin-top: 30px; }
        .section-tag { border-bottom: 3px solid #000; font-weight: bold; margin-bottom: 12px; font-size: 1.2rem; }
        .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: rgba(0,0,0,0.03); padding: 10px; border: 1px solid #000; }
        .w-item { display: flex; justify-content: space-between; border-bottom: 1px solid #ccc; font-size: 0.9rem; }
        .headline-xl { font-family: 'Noto Naskh Arabic', serif; font-size: 44px; margin-bottom: 15px; }
        .article-columns { column-count: 2; column-gap: 30px; text-align: justify; font-size: 1.25rem; line-height: 1.7; white-space: pre-wrap; }
        .final-footer { margin-top: 50px; border-top: 2px solid #000; text-align: center; padding-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="controls">
        <div id="badge-display" class="issue-badge">العدد: ...</div>
        <button id="music-btn" onclick="toggleRain()" class="music-btn">🌧️ تشغيل صوت المطر</button>
    </div>
    <div class="newspaper-page">
        <header class="masthead-container">
            <h1 class="main-title">النضال</h1>
            <div class="sub-header">
                <span id="date-display">...</span>
                <span>جدة، المملكة العربية السعودية</span>
                <span id="issue-display">العدد: ...</span>
            </div>
        </header>
        <div class="main-layout">
            <aside class="sidebar">
                <div class="section-tag">طقس العواصم</div>
                <div class="weather-grid">
                    <div class="w-item"><span>جدة</span> <span>٣١°</span></div>
                    <div class="w-item"><span>القدس</span> <span>١٨°</span></div>
                    <div class="w-item"><span>بيروت</span> <span>٢٠°</span></div>
                    <div class="w-item"><span>القاهرة</span> <span>٢٢°</span></div>
                    <div class="w-item"><span>بغداد</span> <span>٢٠°</span></div>
                </div>
            </aside>
            <main>
                <article>
                    <h2 id="main-h" class="headline-xl">...</h2>
                    <div id="main-t" class="article-columns">...</div>
                </article>
                <hr style="border:0; border-top:3px double #000; margin:30px 0;">
                <article>
                    <h3 id="sec-h" style="font-size:30px; font-family:'Noto Naskh Arabic';">...</h3>
                    <div id="sec-t" class="article-columns">...</div>
                </article>
            </main>
            <aside class="sidebar"><div class="section-tag">شؤون الساعة</div><div style="font-style:italic; color:#666;">مساحة للتحليل الجانبي.</div></aside>
        </div>
        <footer class="final-footer">جريدة "النضال" - جدة - ٢٠٢٦</footer>
    </div>

    <script src="news.js"></script>
    <script>
        function updatePage() {
            if (typeof nidalData !== 'undefined') {
                document.getElementById('badge-display').innerText = "نشرة رقمية - العدد: " + nidalData.issueNumber;
                document.getElementById('issue-display').innerText = "العدد: " + nidalData.issueNumber;
                document.getElementById('date-display').innerText = nidalData.date;
                document.getElementById('main-h').innerText = nidalData.mainHeadline;
                document.getElementById('main-t').innerText = nidalData.mainArticle;
                document.getElementById('sec-h').innerText = nidalData.secondHeadline;
                document.getElementById('sec-t').innerText = nidalData.secondArticle;
            }
        }
        window.onload = updatePage;

        // كود المطر المولد برمجياً
        let audioCtx = null; let rainNode = null; let isPlaying = false;
        function toggleRain() {
            const btn = document.getElementById('music-btn');
            if (!isPlaying) {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const bufferSize = 2 * audioCtx.sampleRate;
                const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                let lastOut = 0.0;
                for (let i = 0; i < bufferSize; i++) {
                    const white = Math.random() * 2 - 1;
                    output[i] = (lastOut + (0.02 * white)) / 1.02; lastOut = output[i]; output[i] *= 3.5;
                }
                rainNode = audioCtx.createBufferSource(); rainNode.buffer = noiseBuffer; rainNode.loop = true;
                const gainNode = audioCtx.createGain(); gainNode.gain.value = 0.05;
                rainNode.connect(gainNode).connect(audioCtx.destination); rainNode.start();
                btn.innerText = "🔇 إيقاف الضجيج"; isPlaying = true;
            } else {
                if (rainNode) { rainNode.stop(); rainNode.disconnect(); }
                btn.innerText = " تشغيل صوت الضجيج"; isPlaying = false;
            }
        }
    </script>
</body>
</html>
