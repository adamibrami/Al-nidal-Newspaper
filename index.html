<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جريدة النضال</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="controls">
        <div class="nav-links">
            <div id="badge-display" class="issue-badge">...</div>
            <select class="archive-dropdown" onchange="loadOtherIssue(this.value)">
                <option value="news.js">العدد الحالي</option>
                <option value="issue1.js">العدد رقم ١</option>
            </select>
        </div>
        <button id="music-btn" onclick="toggleNoise()" class="music-btn">📻 تشغيل الضجيج</button>
    </div>

    <div class="newspaper-page">
        <header class="masthead-container">
            <h1 class="main-title">النضال</h1>
            <div class="sub-header">
                <span id="date-display">...</span>
                <span>جدة - المملكة العربية السعودية</span>
                <span id="issue-display">...</span>
            </div>
        </header>
        <div class="main-layout">
            <aside class="sidebar">
                <div class="section-tag">طقس المدن</div>
                <div class="weather-grid">
                    <div class="w-item"><span>جدة</span><span>٣١°</span></div>
                    <div class="w-item"><span>القدس</span><span>١٨°</span></div>
                </div>
            </aside>
            <main>
                <article>
                    <h2 id="main-h" class="headline-xl">...</h2>
                    <div id="main-t" class="article-columns">...</div>
                </article>
                <hr class="divider">
                <h3 id="sec-h">...</h3>
                <div id="sec-t" class="article-columns">...</div>
            </main>
        </div>
    </div>

    <script id="data-script" src="news.js"></script>
    <script src="script.js"></script>
</body>
</html>
