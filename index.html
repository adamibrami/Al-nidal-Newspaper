<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جريدة النضال</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="controls">
        <div class="nav-links">
            <div id="badge-display" class="issue-badge">العدد: ...</div>
            <select id="archive-select" class="archive-dropdown" onchange="loadOtherIssue(this.value)"></select>
            <button onclick="addNewIssue()" style="background:#e74c3c; color:white; border:none; border-radius:5px; padding: 5px 15px; cursor:pointer; font-weight:bold;">+</button>
        </div>
        <button id="music-btn" onclick="toggleNoise()" class="music-btn">📻 تشغيل الضجيج</button>
    </div>

    <div class="newspaper-page">
        <header class="masthead-container">
            <h1 class="main-title">النضال</h1>
            <div class="sub-header">
                <span id="date-display">...</span>
                <span>جدة، المملكة العربية السعودية</span>
                <span id="issue-display">...</span>
            </div>
        </header>

        <main class="main-layout">
            <section class="sidebar">
                <div class="section-tag">طقس العواصم</div>
                <div class="weather-grid">
                    <div class="w-item"><span>جدة</span><span>٣١°</span></div>
                    <div class="w-item"><span>القدس</span><span>١٨°</span></div>
                </div>
            </section>

            <section class="content-area">
                <article>
                    <h2 id="main-h" class="headline-xl">جاري الاتصال بالسحاب...</h2>
                    <div id="main-t" class="article-columns">...</div>
                </article>
                <hr class="divider">
                <article>
                    <h3 id="sec-h" style="font-size:28px; font-family:'Noto Naskh Arabic';">...</h3>
                    <div id="sec-t" class="article-columns" style="column-count:1;">...</div>
                </article>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
